<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Generator</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/ai.css">
</head>
<body>

<header>
    <nav>
        <div class="logo">AI Assets Hub</div>

        <div id="menuBtn">☰</div>

        <ul id="navLinks">
            <li><a href="../index.html">Home</a></li>
            <li><a href="assets.html">Assets</a></li>
            <li><a href="ai.html">AI Generator</a></li>
        </ul>
    </nav>
</header>

<section class="ai-box">

    <textarea id="promptInput" placeholder="Describe your image..."></textarea>

    <select id="ratioSelect">
        <option value="1:1">1:1 Square</option>
        <option value="16:9">16:9 Landscape</option>
        <option value="9:16">9:16 Portrait</option>
        <option value="4:5">4:5 Social</option>
    </select>

    <div class="toggle-box">
        <label>Transparent Background</label>
        <input type="checkbox" id="transparentToggle">
    </div>

    <button id="generateBtn" class="primary-btn">Generate</button>

    <div id="loadingText" style="display:none;">
        Generating...
    </div>

    <div id="outputBox" style="display:none;">
        <img id="generatedImage" src="" alt="Generated Image">
        <button id="downloadBtn" class="primary-btn">Download</button>
    </div>

</section>

<script src="../js/menu.js"></script>
<script src="../js/ai.js"></script>

</body>
</html>
